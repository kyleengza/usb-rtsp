# cameras.yml schema (the admin panel writes this; you can also hand-edit).
#
# Each camera entry produces one mediamtx path mounted at rtsp://<host>:8554/<name>.
# `by_id` is the stable /dev/v4l/by-id/<...>-video-index0 leaf — survives unplug/replug
# and USB reordering. Run `bin/usb-rtsp-detect` to see what's available.
#
# `format` must be one of the formats the camera advertises (MJPG, YUYV, H264).
# `width`/`height`/`fps` must be a valid combination from the camera's capabilities.
# `encode` is the codec sent to mediamtx — what RTSP clients actually receive:
#   - h264   (default): libx264 ultrafast. Universal compat (VLC Android, browsers
#                       via HLS/WebRTC if enabled, every CCTV app). Costs ~70% of
#                       one A76 core at 1080p30 on Pi 5.
#   - mjpeg            : RFC 2435 RTP/JPEG. ~10-15% CPU but fragile across players;
#                       cheap UVC cams produce JPEG that mediamtx can't fragment
#                       cleanly, leading to glitches on Android players.
#   - copy             : passthrough, zero CPU. Only usable when format=H264 (a few
#                       webcams do native H.264) or when the camera's MJPEG is
#                       known RFC-2435-clean (rare).
# `profile` selects buffering/transport from etc/profiles.yml.

cameras:
  - name: cam0
    by_id: usb-GENERAL_GENERAL_WEBCAM_JH0319_20200710_v012-video-index0
    format: MJPG
    width: 1920
    height: 1080
    fps: 30
    encode: h264
    profile: balanced
    # Quality preset (compression knob). See etc/quality-presets.yml.
    #   low    — smaller, more artifacts (0.5× bitrate, ultrafast)
    #   medium — balanced (1.0× bitrate, ultrafast)         ← default
    #   high   — better, more CPU (1.5× bitrate, veryfast, 1 B-frame)
    quality: medium
    # Advanced overrides — comment in only what you want to override:
    # bitrate_kbps: 2000      # explicit kbps; blank = preset × resolution
    # x264_preset: veryfast   # ultrafast | superfast | veryfast | faster | fast
    # gop_seconds: 2          # keyframe interval; smaller = quicker recovery
    # bframes: 0              # 0..3; >0 auto-promotes -profile:v to main
    # mjpeg_qv: 3             # 1 (best) … 31 (worst), only when encode=mjpeg
