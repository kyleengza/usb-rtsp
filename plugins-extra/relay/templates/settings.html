<div class="plugin-settings" data-plugin-settings="relay">
  <h3 class="inputs-heading">Add a relay</h3>
  <p class="hint">Pull a remote RTSP / RTMP / HTTP stream and re-broadcast
  it as a local path. Existing relays appear as Inputs above; per-source
  settings live on the dashboard card.</p>
  <form data-relay-add>
    <div class="advanced-grid">
      <label class="adv">Name <input type="text" name="name" required pattern="[a-z][a-z0-9_-]{0,15}" placeholder="e.g. doorbell"></label>
      <label class="adv">Upstream URL <input type="text" name="url" required placeholder="rtsp://192.168.1.50/cam"></label>
      <label class="adv">User (optional) <input type="text" name="user"></label>
      <label class="adv">Password (optional) <input type="password" name="pass"></label>
      <label class="adv">Transport
        <select name="transport">
          <option value="">(auto)</option>
          <option value="tcp">tcp</option>
          <option value="udp">udp</option>
          <option value="udp_multicast">udp_multicast</option>
        </select>
      </label>
    </div>
    <details class="advanced">
      <summary>Re-encode (optional, downsize/transcode upstream) ▾</summary>
      <div class="advanced-grid">
        <label class="adv"><input type="checkbox" name="encode_enabled"> Enable re-encode</label>
        <label class="adv">Quality preset
          <select name="encode_preset">
            <option value="low">low</option>
            <option value="medium" selected>medium</option>
            <option value="high">high</option>
          </select>
        </label>
        <label class="adv">Bitrate (kbps) <input type="number" name="encode_bitrate_kbps" min="100" max="20000" placeholder="auto"></label>
        <label class="adv">Resolution
          <select name="encode_resolution">
            <option value="" selected>(upstream native)</option>
            <option value="1920x1080">1920×1080</option>
            <option value="1280x720">1280×720</option>
            <option value="854x480">854×480</option>
            <option value="640x360">640×360</option>
          </select>
        </label>
        <label class="adv">FPS <input type="number" name="encode_fps" min="1" max="240" placeholder="upstream"></label>
      </div>
    </details>
    <div class="actions">
      <button type="button" data-act="probe-source">Test upstream</button>
      <button type="submit">Add &amp; reload</button>
    </div>
    <div class="form-status" data-relay-status></div>
  </form>
</div>

<script src="/static/relay/relay.js"></script>
